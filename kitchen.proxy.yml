---
driver:
  name: proxy
  host: localhost
  reset_command: "exit 0"
  port: <%= ENV["machine_port"] %>
  username: <%= ENV["machine_user"] %>
  password: <%= ENV["machine_pass"] %>

platforms:
  - name: localhost
    provisioner:
      install_strategy: skip
      cinc_omnibus_root: /opt/cinc-workstation
  - name: windows-winrm
    provisioner:
      install_strategy: skip
      cinc_omnibus_root: 'C:\cinc-project\cinc-workstation'
    transport:
      name: winrm
      elevated: true
  - name: windows-fips-ssh
    provisioner:
      install_strategy: skip
      cinc_omnibus_root: 'C:\cinc-project\cinc-workstation'
    transport:
      name: ssh
      username: <%= ENV['machine_user'] %>
      password: <%= ENV['machine_pass'] %>
