---
driver:
  name: vagrant
  linked_clone: false

provisioner:
  name: chef_infra
  product_name: <%= ENV.fetch("KITCHEN_PRODUCT_NAME", "chef").inspect %>
  install_strategy: <%= ENV.fetch("KITCHEN_INSTALL_STRATEGY", "once").inspect %>
  chef_client_path: <%= ENV.fetch("KITCHEN_CHEF_CLIENT_PATH", "/opt/chef/bin/chef-client").inspect %>
  ruby_bindir: <%= ENV.fetch("KITCHEN_CHEF_RUBY_BINDIR", "/opt/chef/embedded/bin").inspect %>
  deprecations_as_errors: true
  chef_license: accept-no-persist

verifier:
  name: inspec

platforms:
  - name: almalinux-9
  - name: ubuntu-24.04
  - name: windows-2025
    driver:
      box: stromweld/windows-2025
      customize:
        memory: 4096

suites:
  - name: default
    verifier:
      inspec_tests:
        - test/integration/default
