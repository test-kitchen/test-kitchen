---
driver:
  name: vagrant
  linked_clone: false

provisioner:
  name: cinc_infra
  product_name: cinc
  install_strategy: once
  deprecations_as_errors: true

verifier:
  name: inspec

platforms:
  - name: almalinux-9
  - name: ubuntu-24.04
  - name: windows-2025
    driver:
      box: stromweld/windows-2025
      customize:
        memory: 4096

suites:
  - name: default
    verifier:
      inspec_tests:
        - test/integration/default
